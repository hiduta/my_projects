<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Password Generator</title>
    <link rel="icon" href="copy-vector-icon-paste-icons-600nw-2295599049.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href = "main.css">
</head>
<body>
    <div>
        <h1>Generate a</h1>
        <h1>random password</h1>
        <h5>Never use an insecure password again</h5>
        <button id = "genp">Generate passwords</button>
        <div class = "spec">
            <label for="sym"><input type="checkbox" checked id="sym" aria-checked="true">Symbols</label>
            <label for="num"><input type="checkbox" checked id ="num" aria-checked="true">Numbers</label>
            <label for="leng" id="leng-label" title="change">Length<input type="number" id="leng" min="0" value="15" max="90" aria-valuemin="0"
                aria-valuemax="90" aria-valuenow="15" step="1"></label>
        </div>
        <div class = "spec">
            <label for="uppcase"><input type="checkbox" checked id="uppcase" aria-checked="true">Upper-case</label>
            <label for="lowcase"><input type="checkbox" checked id ="lowcase" aria-checked="true">Lower-case</label>
            <input type="range" id="leng-range" min="0" value="15" max="90" aria-valuemin="0"
                aria-valuemax="90" aria-valuenow="15" step="1">
        </div>
        <div class = "linebr"></div>
        <div id="spec-img">
            <img src="copy-vector-icon-paste-icons-600nw-2295599049.ico" id="ico-1">
            <img src="copy-vector-icon-paste-icons-600nw-2295599049.ico" id="ico-2">
        </div>
        <div id = "pass">
            <span class= "passg" draggable="true" id = "pass1" title="click to copy">password 1</span>
            <span class= "passg" draggable="true" id = "pass2" title="click to copy">password 2</span>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
